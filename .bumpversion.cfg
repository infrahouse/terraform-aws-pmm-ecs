[bumpversion]
current_version = 1.2.0
commit = True
tag = True
tag_name = {new_version}

[bumpversion:file:README.md]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:locals.tf]
search = module_version = "{current_version}"
replace = module_version = "{new_version}"

[bumpversion:file:docs/index.md]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:docs/PERCONA_SERVER_SETUP.md]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:docs/RDS_SETUP.md]
search = version = "{current_version}"
replace = version = "{new_version}"

[bumpversion:file:docs/BACKUP_RESTORE.md]
search = version = "{current_version}"
replace = version = "{new_version}"
